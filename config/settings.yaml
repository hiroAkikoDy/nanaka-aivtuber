llm:
  model: "gpt-4o-mini"
  base_url: "https://api.openai.com/v1"
  system_prompt_file: "system_prompt.txt"

voicevox:
  host: "127.0.0.1"
  port: 50021
  speaker_id: 3

audio:
  output_device_name: "Realtek"


multi_persona:
  enabled: true  # true: マルチペルソナモード / false: 単独モード
  mode: "dialogue"  # dialogue: 対話モード / solo: 単独モード
  turn_limit: 4  # 最大会話ターン数（ナナカ→リョウ→ナナカ→リョウで4ターン）

youtube:
  enabled: true
  mode: "dummy"  # live: リアルタイム配信モード / dummy: ダミーモード

  # OAuth 2.0 認証
  credentials_path: "credentials/client_secret.json"
  token_path: "credentials/token.json"

  # 配信情報（環境変数 YOUTUBE_VIDEO_ID または自動取得）
  video_id: null

  # ポーリング設定
  polling_interval: 5  # 秒単位（YouTube推奨: 5秒以上）
  max_results: 10      # 1回のリクエストで取得する最大コメント数

  # レート制限対策
  quota_limit_per_day: 10000  # YouTube API クォータ上限
  quota_warning_threshold: 8000  # 警告を出す閾値

# OBS連携設定
obs:
  enabled: true
  output_dir: "output"
  speaker_file: "current_speaker.txt"
  text_file: "current_text.txt"
  max_text_length: 100  # OBSに表示する最大文字数

  # OBS WebSocket設定
  websocket:
    enabled: true  # true: WebSocket有効 / false: テキストファイルのみ
    host: "localhost"
    port: 4455
    password: ""  # OBS WebSocketのパスワード（環境変数 OBS_WS_PASSWORD で上書き）

  # シーン設定（OBS側のシーン名と一致させる）
  scenes:
    waiting: "待機シーン"
    streaming: "配信シーン"
    ending: "終了シーン"

  # ソース設定（OBS側のソース名と一致させる）
  sources:
    nanaka_image: "ナナカ画像"
    ryou_image: "リョウ画像"
    speaker_text: "発言者名"
    dialogue_text: "テキスト"

# キャラクター設定
characters:
  nanaka:
    name: "ナナカ"
    image_dir: "assets/characters/nanaka"
    emotions:
      通常: "normal.png"
      嬉しい: "happy.png"
      ワクワク: "excited.png"
      驚き: "surprised.png"
      悲しい: "sad.png"

  ryou:
    name: "リョウ"
    image_dir: "assets/characters/ryou"
    emotions:
      通常: "normal.png"
      嬉しい: "happy.png"
      ワクワク: "excited.png"
      驚き: "surprised.png"
      悲しい: "sad.png"
